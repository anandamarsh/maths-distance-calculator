<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trail Distances Outro</title>
    <style>
      :root {
        --bg-top: #18365a;
        --bg-bottom: #040915;
        --panel-text: #f8fafc;
        --cyan-soft: #7dd3fc;
        --gold: #facc15;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #020617;
        color: var(--panel-text);
        font-family: "Courier New", "Lucida Console", monospace;
        overflow: hidden;
      }

      body {
        min-height: 100vh;
      }

      .screen {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 18%, rgba(125, 211, 252, 0.16), transparent 18%),
          radial-gradient(ellipse at top, var(--bg-top) 0%, #0d1b35 46%, var(--bg-bottom) 100%);
      }

      .grid {
        position: absolute;
        inset: 0;
        opacity: 0.12;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 38px 38px;
      }

      .stars {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.75);
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.45);
      }

      .wrap {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        width: 100vw;
        margin: 0 auto;
        padding: 68px 3.5vw 72px;
        text-align: center;
      }

      .logo {
        width: 108px;
        height: 108px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        background: rgba(9, 21, 43, 0.68);
        box-shadow:
          0 0 34px rgba(125, 211, 252, 0.22),
          inset 0 0 0 1px rgba(125, 211, 252, 0.1);
      }

      .logo img {
        width: 84px;
        height: 84px;
        object-fit: contain;
      }

      .lead {
        margin: 0;
        color: var(--panel-text);
        font-size: clamp(24px, 2.3vw, 40px);
        font-weight: 700;
        line-height: 1.34;
      }

      .site {
        margin: 0;
        color: var(--gold);
        font-size: clamp(40px, 4vw, 64px);
        font-weight: 700;
        letter-spacing: 0.06em;
        text-shadow: 0 0 24px rgba(250, 204, 21, 0.18);
      }

      .url {
        margin: 0;
        color: var(--cyan-soft);
        font-size: clamp(18px, 1.8vw, 28px);
      }

      .url a {
        color: inherit;
      }

      @media (max-width: 720px) {
        .wrap {
          padding: 44px 1rem 52px;
        }
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <div class="grid"></div>
      <div class="stars" aria-hidden="true">
        <span class="star" style="left: 8%; top: 9%;"></span>
        <span class="star" style="left: 19%; top: 28%;"></span>
        <span class="star" style="left: 37%; top: 7%;"></span>
        <span class="star" style="left: 55%; top: 16%;"></span>
        <span class="star" style="left: 72%; top: 13%;"></span>
        <span class="star" style="left: 86%; top: 30%;"></span>
        <span class="star" style="left: 91%; top: 8%;"></span>
        <span class="star" style="left: 12%; top: 56%;"></span>
        <span class="star" style="left: 28%; top: 76%;"></span>
        <span class="star" style="left: 49%; top: 64%;"></span>
        <span class="star" style="left: 67%; top: 81%;"></span>
        <span class="star" style="left: 82%; top: 69%;"></span>
        <span class="star" style="left: 92%; top: 85%;"></span>
      </div>

      <div class="wrap">
        <div class="logo">
          <img src="interactive-maths-icon.svg" alt="Interactive Maths icon" />
        </div>
        <p class="lead" contenteditable="true">Play this and more games at</p>
        <p class="site" contenteditable="true">SeeMaths.com</p>
        <p class="url"><a href="https://www.seemaths.com">www.seemaths.com</a></p>
      </div>
    </main>
  </body>
</html>
